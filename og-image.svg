<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Claude Code 101 — A developer guide to agentic coding">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.35">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- brand pill -->
  <g transform="translate(80,80)">
    <rect width="220" height="44" rx="22" fill="#0b1220" stroke="#22d3ee" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="24" cy="22" r="5" fill="#22d3ee"/>
    <text x="42" y="28" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#22d3ee" letter-spacing="2">TERMINAL-NATIVE AI</text>
  </g>

  <!-- headline -->
  <text x="80" y="260" font-family="'Inter', system-ui, sans-serif" font-size="96" font-weight="800" fill="#ffffff">Claude Code</text>
  <text x="80" y="360" font-family="'Inter', system-ui, sans-serif" font-size="96" font-weight="800" fill="url(#accent)">101</text>

  <!-- subhead -->
  <text x="80" y="430" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">A developer's guide to agentic loops, subagents,</text>
  <text x="80" y="468" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">skills, MCP servers, and polyglot orchestration.</text>

  <!-- URL -->
  <g transform="translate(80,540)">
    <rect width="310" height="42" rx="8" fill="#0b1220" stroke="#1e293b" stroke-width="1"/>
    <text x="18" y="28" font-family="'Fira Code', ui-monospace, monospace" font-size="18" fill="#22d3ee">$ </text>
    <text x="42" y="28" font-family="'Fira Code', ui-monospace, monospace" font-size="18" fill="#e2e8f0">claudecode101.dev</text>
  </g>

  <!-- right-side decorative terminal -->
  <g transform="translate(700,170)">
    <rect width="440" height="310" rx="16" fill="#0d1117" stroke="#334155" stroke-width="1.5"/>
    <rect width="440" height="40" rx="16" fill="#0b1220"/>
    <rect y="24" width="440" height="16" fill="#0b1220"/>
    <circle cx="22" cy="20" r="6" fill="#ef4444" opacity="0.9"/>
    <circle cx="42" cy="20" r="6" fill="#eab308" opacity="0.9"/>
    <circle cx="62" cy="20" r="6" fill="#22c55e" opacity="0.9"/>
    <text x="220" y="25" font-family="'Fira Code', ui-monospace, monospace" font-size="12" fill="#64748b" text-anchor="middle">user@machine: ~/project</text>

    <g font-family="'Fira Code', ui-monospace, monospace" font-size="14">
      <text x="22" y="80" fill="#e2e8f0">$ claude "refactor auth to JWT"</text>
      <text x="22" y="114" fill="#22d3ee">› Exploring workspace...</text>
      <text x="42" y="138" fill="#94a3b8">found auth.ts, session.ts</text>
      <text x="22" y="172" fill="#94a3b8">› Thinking: use jsonwebtoken</text>
      <text x="22" y="206" fill="#f59e0b">› Executing: npm install</text>
      <text x="22" y="240" fill="#22c55e">✓ Modified auth.ts. Tests passed.</text>
      <text x="22" y="278" fill="#e2e8f0">$ <tspan fill="#22d3ee">_</tspan></text>
    </g>
  </g>
</svg>
