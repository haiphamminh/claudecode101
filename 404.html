<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | Claude Code 101</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Claude Code 101.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.svg">
  <meta name="theme-color" content="#020617">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="js/tailwind-config.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-950 text-slate-300 font-sans antialiased min-h-screen flex items-center justify-center px-4 bg-gradient-radial">
  <main class="max-w-xl w-full text-center">
    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-xs font-mono mb-6">
      <span class="w-2 h-2 rounded-full bg-red-400 animate-pulse"></span>
      HTTP 404
    </div>
    <h1 class="text-7xl md:text-8xl font-bold text-white leading-none mb-4">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">404</span>
    </h1>
    <p class="text-2xl font-semibold text-white mb-3">Route not found</p>
    <p class="text-slate-400 mb-8">The page you were looking for doesn't exist, or was moved.</p>

    <div class="bg-[#0d1117] border border-slate-700 rounded-lg p-4 text-left font-mono text-sm mb-8 mx-auto max-w-md">
      <div class="text-slate-500">$ claude --find "<span id="missing-path" class="text-red-400">?</span>"</div>
      <div class="text-amber-400">› No matching route in sitemap.</div>
      <div class="text-cyan-400">› Suggesting: <a href="/" class="underline hover:text-cyan-300">/</a></div>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/" class="inline-flex justify-center items-center px-6 py-3 rounded-lg bg-cyan-500 text-slate-950 font-semibold hover:bg-cyan-400 transition-colors shadow-[0_0_20px_rgba(6,182,212,0.4)]">
        Return home
      </a>
      <a href="/#faq" class="inline-flex justify-center items-center px-6 py-3 rounded-lg border border-slate-700 bg-slate-800/50 text-white font-medium hover:bg-slate-800 hover:border-slate-600 transition-colors">
        Read the FAQ
      </a>
    </div>
  </main>
  <script>
    var el = document.getElementById('missing-path');
    if (el) { el.textContent = location.pathname + location.search; }
  </script>
</body>
</html>
